<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Connect - Blog Post</title>
    <!-- __SOCIAL_HEAD_INJECT__ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0A; }
        .bg-dark { background-color: #0A0A0A; }
        .text-accent { color: #FF6B00; }
        .bg-accent { background-color: #FF6B00; }
        .border-accent { border-color: #FF6B00; }
    </style>
</head>
<body class="bg-dark text-white min-h-screen flex flex-col">
    <header class="bg-dark border-b border-gray-800">
        <nav class="container mx-auto px-0 sm:px-6 md:px-8 lg:px-16 xl:px-20 py-4 flex items-center justify-between">
            <a href="index.html" class="text-white font-bold text-lg sm:text-xl md:text-2xl tracking-tight">NEWS CONNECT</a>
            <div class="hidden md:flex items-center space-x-6 lg:space-x-8 xl:space-x-10">
                <a href="index.html" class="text-white text-xs md:text-sm font-medium hover:text-accent pb-1 transition">Home</a>
                <a href="about.html" class="text-white text-xs md:text-sm font-medium hover:text-accent pb-1 transition">About Us</a>
                <a href="blog.html" class="text-white text-xs md:text-sm font-medium hover:text-accent pb-1 transition">Blog</a>
                <a href="contact.html" class="text-white text-xs md:text-sm font-medium hover:text-accent pb-1 transition">Contact Us</a>
            </div>
        </nav>
    </header>

    <main class="flex-1">
        <section class="container mx-auto px-4 sm:px-6 md:px-8 lg:px-16 xl:px-20 py-12 sm:py-16">
            <div id="postContainer" class="max-w-4xl mx-auto bg-gray-900 border border-gray-800 rounded-lg overflow-hidden shadow-lg">
                <div class="p-6 sm:p-10 text-center text-gray-400">Loading post...</div>
            </div>
            <div class="max-w-4xl mx-auto mt-8 text-sm text-gray-500">
                <a href="blog.html" class="text-accent hover:text-accent/80">← Back to Blog</a>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 border-t border-gray-800">
        <div class="container mx-auto px-0 sm:px-6 md:px-8 lg:px-16 xl:px-20 py-6 text-center text-gray-500 text-xs sm:text-sm">
            © 2025 NEWS CONNECT. All rights reserved.
        </div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8be0_AONBFXhM9KXILDGgBGluMyoTB2Y",
            authDomain: "topeblog-76c2f.firebaseapp.com",
            projectId: "topeblog-76c2f",
            storageBucket: "topeblog-76c2f.firebasestorage.app",
            messagingSenderId: "260807786691",
            appId: "1:260807786691:web:675932add872442acfa276",
            measurementId: "G-XYKB3C88NE"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const postContainer = document.getElementById('postContainer');

        const DEFAULT_SHARE_IMAGE_PATH = 'img/home.png';

        const absoluteFromPage = (pathOrUrl) => {
            const s = pathOrUrl == null ? '' : String(pathOrUrl).trim();
            if (!s) return new URL(DEFAULT_SHARE_IMAGE_PATH, window.location.href).href;
            if (/^https?:\/\//i.test(s)) return s;
            return new URL(s, window.location.href).href;
        };

        const socialPreviewTitle = (raw, maxLen = 100) => {
            let t = String(raw || '').trim().replace(/\s+/g, ' ');
            t = t.replace(/\s+\.{2,}.*$/u, '').trim();
            if (!t) return String(raw || 'News Connect').trim().slice(0, maxLen);
            if (t.length <= maxLen) return t;
            const cut = t.slice(0, maxLen);
            const sp = cut.lastIndexOf(' ');
            return `${sp > 35 ? cut.slice(0, sp) : cut}…`.trim();
        };

        const socialPreviewDescription = (body, rawTitle, ogTitle, maxLen = 160) => {
            let plain = String(body || '').replace(/\s+/g, ' ').trim();
            if (!plain) return 'Read on News Connect.';
            const prefixes = [String(rawTitle || '').trim(), String(ogTitle || '').trim()].filter((p) => p.length >= 8);
            for (const p of prefixes) {
                if (plain.toLowerCase().startsWith(p.toLowerCase())) {
                    plain = plain.slice(p.length).trim().replace(/^[\s.:;\-–—|]+/, '');
                }
            }
            if (!plain) return 'Read on News Connect.';
            if (plain.length > maxLen) {
                let cut = plain.slice(0, maxLen - 1);
                const sp = cut.lastIndexOf(' ');
                cut = sp > 30 ? cut.slice(0, sp) : cut;
                plain = `${cut.trim()}…`;
            }
            return plain;
        };

        const setHeadMeta = (attr, key, content) => {
            const sel = attr === 'name' ? `meta[name="${key}"]` : `meta[property="${key}"]`;
            let el = document.querySelector(sel);
            if (!el) {
                el = document.createElement('meta');
                el.setAttribute(attr, key);
                document.head.appendChild(el);
            }
            el.setAttribute('content', content);
        };

        const updateShareMeta = (data, postId) => {
            const rawTitle = data.title || 'News Connect';
            const ogTitle = socialPreviewTitle(rawTitle);
            const desc = socialPreviewDescription(data.body, rawTitle, ogTitle);
            const postUrl = `${window.location.origin}${window.location.pathname}?id=${encodeURIComponent(postId)}`;
            const hasPostImage = data.imageUrl && String(data.imageUrl).trim();
            const imageUrl = absoluteFromPage(hasPostImage ? data.imageUrl.trim() : DEFAULT_SHARE_IMAGE_PATH);

            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', desc);
            else {
                const m = document.createElement('meta');
                m.setAttribute('name', 'description');
                m.setAttribute('content', desc);
                document.head.appendChild(m);
            }

            setHeadMeta('property', 'og:site_name', 'News Connect');
            setHeadMeta('property', 'og:locale', 'en_US');
            setHeadMeta('property', 'og:type', 'article');
            setHeadMeta('property', 'og:url', postUrl);
            setHeadMeta('property', 'og:title', ogTitle);
            setHeadMeta('property', 'og:description', desc);
            setHeadMeta('property', 'og:image', imageUrl);
            setHeadMeta('property', 'og:image:secure_url', imageUrl);
            setHeadMeta('property', 'og:image:width', '1200');
            setHeadMeta('property', 'og:image:height', '630');
            setHeadMeta('property', 'og:image:alt', ogTitle);

            let published = '';
            if (data.createdAt && typeof data.createdAt.toDate === 'function') {
                try {
                    published = data.createdAt.toDate().toISOString();
                } catch {
                    /* ignore */
                }
            } else if (data.createdDate) {
                const d = new Date(data.createdDate);
                if (!Number.isNaN(d.getTime())) published = d.toISOString();
            }
            if (published) setHeadMeta('property', 'article:published_time', published);

            setHeadMeta('name', 'twitter:card', 'summary_large_image');
            setHeadMeta('name', 'twitter:url', postUrl);
            setHeadMeta('name', 'twitter:title', ogTitle);
            setHeadMeta('name', 'twitter:description', desc);
            setHeadMeta('name', 'twitter:image', imageUrl);
            setHeadMeta('name', 'twitter:image:alt', ogTitle);

            if (!document.querySelector('link[rel="canonical"]')) {
                const canonical = document.createElement('link');
                canonical.setAttribute('rel', 'canonical');
                canonical.setAttribute('href', postUrl);
                document.head.appendChild(canonical);
            }
        };

        const getQueryParam = (key) => {
            const params = new URLSearchParams(window.location.search);
            return params.get(key);
        };

        let commentsUnsubscribe = null;

        const escapeHtml = (str) => {
            const el = document.createElement('div');
            el.textContent = str == null ? '' : String(str);
            return el.innerHTML;
        };

        const formatCommentWhen = (ts) => {
            if (!ts || typeof ts.toDate !== 'function') return '';
            return ts.toDate().toLocaleString();
        };

        const setCommentsStatus = (msg, show) => {
            const el = document.getElementById('commentsStatus');
            if (!el) return;
            el.textContent = msg || '';
            el.classList.toggle('hidden', !show);
        };

        const sortByCreated = (a, b) => (a._ms || 0) - (b._ms || 0);

        const buildCommentTree = (flat) => {
            const ids = new Set(flat.map((c) => c.id));
            const byParent = new Map();
            flat.forEach((c) => {
                const parentKey = c.parentId && ids.has(c.parentId) ? c.parentId : '__root__';
                if (!byParent.has(parentKey)) byParent.set(parentKey, []);
                byParent.get(parentKey).push(c);
            });
            byParent.forEach((arr) => arr.sort(sortByCreated));
            return byParent;
        };

        const appendCommentBranch = (container, nodes, byParent, depth) => {
            nodes.forEach((comment) => {
                const row = document.createElement('div');
                row.className = depth > 0 ? 'mt-3 ml-4 sm:ml-6 pl-4 border-l-2 border-gray-700' : 'mt-4';

                const card = document.createElement('div');
                card.className = 'bg-gray-800/50 rounded-lg p-4 border border-gray-700';
                card.dataset.commentId = comment.id;

                const when = formatCommentWhen(comment.createdAt);
                card.innerHTML = `
                    <div class="flex flex-wrap justify-between gap-2 items-baseline">
                        <span class="font-semibold text-accent">${escapeHtml(comment.authorName)}</span>
                        <span class="text-xs text-gray-500">${escapeHtml(when)}</span>
                    </div>
                    <div class="text-gray-200 mt-2 whitespace-pre-wrap break-words">${escapeHtml(comment.text)}</div>
                    <button type="button" class="reply-toggle mt-3 text-sm font-medium text-accent hover:underline">Reply</button>
                    <div class="reply-box hidden mt-3 space-y-2 border-t border-gray-700 pt-3">
                        <input type="text" class="reply-name w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded text-white text-sm placeholder-gray-500" placeholder="Your name" maxlength="120" required>
                        <textarea class="reply-text w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded text-white text-sm placeholder-gray-500" rows="3" maxlength="4000" required placeholder="Write a reply…"></textarea>
                        <button type="button" class="reply-send bg-accent text-white text-sm font-semibold px-4 py-2 rounded hover:bg-opacity-90 disabled:opacity-50">Post reply</button>
                    </div>
                `;

                row.appendChild(card);
                const kids = byParent.get(comment.id) || [];
                if (kids.length) {
                    const nest = document.createElement('div');
                    appendCommentBranch(nest, kids, byParent, depth + 1);
                    row.appendChild(nest);
                }
                container.appendChild(row);
            });
        };

        const renderCommentsList = (flat) => {
            const listEl = document.getElementById('commentsList');
            if (!listEl) return;
            listEl.innerHTML = '';
            if (!flat.length) {
                listEl.innerHTML = '<p class="text-gray-500 text-sm">No comments yet. Be the first to comment.</p>';
                return;
            }
            const byParent = buildCommentTree(flat);
            const roots = byParent.get('__root__') || [];
            appendCommentBranch(listEl, roots, byParent, 0);
        };

        const addComment = async (postId, authorName, text, parentId) => {
            const payload = {
                authorName: authorName.trim(),
                text: text.trim(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (parentId) payload.parentId = parentId;
            await db.collection('posts').doc(postId).collection('comments').add(payload);
        };

        const initCommentsSection = (postId) => {
            if (commentsUnsubscribe) {
                commentsUnsubscribe();
                commentsUnsubscribe = null;
            }

            const listEl = document.getElementById('commentsList');
            const form = document.getElementById('topCommentForm');
            const submitBtn = document.getElementById('topCommentSubmit');
            if (!listEl || !form || !submitBtn) return;

            setCommentsStatus('', false);

            commentsUnsubscribe = db
                .collection('posts')
                .doc(postId)
                .collection('comments')
                .orderBy('createdAt', 'asc')
                .onSnapshot(
                    (snap) => {
                        setCommentsStatus('', false);
                        const flat = snap.docs.map((doc) => {
                            const d = doc.data();
                            const ts = d.createdAt;
                            const _ms = ts && ts.toDate ? ts.toDate().getTime() : 0;
                            return {
                                id: doc.id,
                                authorName: d.authorName,
                                text: d.text,
                                parentId: d.parentId || null,
                                createdAt: ts,
                                _ms
                            };
                        });
                        renderCommentsList(flat);
                    },
                    (err) => {
                        console.error(err);
                        setCommentsStatus(
                            'Comments could not be loaded. In Firebase Console → Firestore → Rules, allow read on posts/{postId}/comments and create for new comments (see project comments in code).',
                            true
                        );
                    }
                );

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const nameEl = document.getElementById('topCommentName');
                const textEl = document.getElementById('topCommentText');
                const name = nameEl && nameEl.value.trim();
                const text = textEl && textEl.value.trim();
                if (!name || !text) return;
                submitBtn.disabled = true;
                setCommentsStatus('', false);
                try {
                    await addComment(postId, name, text, null);
                    form.reset();
                } catch (err) {
                    console.error(err);
                    setCommentsStatus('Could not post comment. Check Firestore rules allow creating documents in posts/{postId}/comments.', true);
                } finally {
                    submitBtn.disabled = false;
                }
            });

            listEl.addEventListener('click', (e) => {
                const toggle = e.target.closest('.reply-toggle');
                if (toggle) {
                    const box = toggle.nextElementSibling;
                    if (box && box.classList.contains('reply-box')) {
                        box.classList.toggle('hidden');
                    }
                    return;
                }

                const send = e.target.closest('.reply-send');
                if (!send) return;
                const box = send.closest('.reply-box');
                const card = send.closest('[data-comment-id]');
                if (!box || !card) return;
                const parentId = card.getAttribute('data-comment-id');
                const nameInp = box.querySelector('.reply-name');
                const textInp = box.querySelector('.reply-text');
                const name = nameInp && nameInp.value.trim();
                const text = textInp && textInp.value.trim();
                if (!name || !text) return;
                send.disabled = true;
                setCommentsStatus('', false);
                addComment(postId, name, text, parentId)
                    .then(() => {
                        nameInp.value = '';
                        textInp.value = '';
                        box.classList.add('hidden');
                    })
                    .catch((err) => {
                        console.error(err);
                        setCommentsStatus('Could not post reply. Check Firestore rules for posts/{postId}/comments.', true);
                    })
                    .finally(() => {
                        send.disabled = false;
                    });
            });
        };

        const renderPost = (data, postId) => {
            // Update page title with post title
            document.title = `News Connect - ${data.title}`;
            updateShareMeta(data, postId);

            const createdAt = data.createdAt && data.createdAt.toDate ? data.createdAt.toDate().toLocaleDateString() : (data.createdDate ? new Date(data.createdDate).toLocaleDateString() : '');
            const postUrl = `${window.location.origin}${window.location.pathname}?id=${encodeURIComponent(postId)}`;
            const heroSrc = data.imageUrl && String(data.imageUrl).trim() ? data.imageUrl.trim() : DEFAULT_SHARE_IMAGE_PATH;
            postContainer.innerHTML = `
                <div class="h-72 bg-gray-800"><img src="${heroSrc}" alt="${escapeHtml(data.title)}" class="w-full h-full object-cover"></div>
                <div class="p-6 sm:p-10 space-y-6">
                    <div class="space-y-3">
                        <span class="inline-block text-xs sm:text-sm text-gray-400">${createdAt}</span>
                        <h1 class="text-3xl sm:text-4xl font-extrabold text-white break-words">${data.title}</h1>
                    </div>
                    <div class="flex items-center gap-4 pt-4 border-t border-gray-800">
                        <span class="text-sm text-gray-400">Share:</span>
                        <div class="flex items-center gap-3">
                            <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(postUrl)}" target="_blank" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center hover:bg-blue-600 transition" title="Share on Facebook">
                                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                            </a>
                            <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(postUrl)}&text=${encodeURIComponent(data.title)}" target="_blank" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center hover:bg-blue-400 transition" title="Share on Twitter">
                                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                            </a>
                            <a href="https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(postUrl)}&title=${encodeURIComponent(data.title)}" target="_blank" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center hover:bg-blue-700 transition" title="Share on LinkedIn">
                                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                            </a>
                            <a href="https://wa.me/?text=${encodeURIComponent(postUrl)}" target="_blank" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center hover:bg-green-600 transition" title="Share on WhatsApp">
                                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            </a>
                            <button onclick="navigator.clipboard.writeText('${postUrl}').then(() => alert('Link copied to clipboard!'))" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center hover:bg-accent transition" title="Copy Link">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="text-gray-300 text-base sm:text-lg leading-relaxed whitespace-pre-wrap break-words">
                        ${data.body}
                    </div>
                    <div class="border-t border-gray-800 pt-8 mt-8 space-y-6">
                        <h2 class="text-xl sm:text-2xl font-bold text-white">Comments</h2>
                        <p id="commentsStatus" class="text-sm text-amber-400 hidden" role="status"></p>
                        <form id="topCommentForm" class="space-y-3">
                            <input type="text" id="topCommentName" name="authorName" required maxlength="120" autocomplete="name" placeholder="Your name" class="w-full sm:max-w-md px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition">
                            <textarea id="topCommentText" name="text" required maxlength="4000" rows="4" placeholder="Write a comment…" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition resize-y min-h-[100px]"></textarea>
                            <button type="submit" id="topCommentSubmit" class="bg-accent text-white font-semibold text-sm px-6 py-2.5 rounded-lg hover:bg-opacity-90 transition disabled:opacity-50 disabled:cursor-not-allowed">Post comment</button>
                        </form>
                        <div id="commentsList" class="pt-2"></div>
                    </div>
                </div>
            `;
            initCommentsSection(postId);
        };

        const showError = (message) => {
            postContainer.innerHTML = `<div class="p-6 sm:p-10 text-center text-red-400">${message}</div>`;
        };

        const loadPost = async () => {
            const postId = getQueryParam('id');
            if (!postId) {
                showError('Invalid post link.');
                return;
            }

            try {
                const doc = await db.collection('posts').doc(postId).get();
                if (!doc.exists) {
                    showError('Post not found.');
                    return;
                }
                renderPost(doc.data(), postId);
            } catch (error) {
                console.error(error);
                showError('Failed to load post. Please try again later.');
            }
        };

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
